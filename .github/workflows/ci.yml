name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    # macOS runner: has `say` (voiceover fallback); brew provides ffmpeg + yt-dlp,
    # so the full real-media suite runs (not just unit tests).
    runs-on: macos-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install media tools
        run: brew install ffmpeg yt-dlp
      - run: npm ci
      - name: Type-check
        run: npm run typecheck
      - name: Test
        run: npm test
